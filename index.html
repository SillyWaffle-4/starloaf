<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starloaf Typing Studio</title>
    <style>
        /* 1. Custom Font Integration */
        @font-face {
            font-family: 'Starloaf';
            src: url('starloaf-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. Global Aesthetic Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #11111b; /* Rich slate dark background */
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 3. Main Glassmorphism UI Container */
        .container {
            width: 100%;
            max-width: 800px;
            background: #181825;
            padding: 45px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: all 0.3s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            border-bottom: 1px solid #313244;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            color: #cba6f7; /* Vibrant pastel purple */
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Mode & Setting Bars */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-toggle {
            display: flex;
            background: #1e1e2e;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid #313244;
        }

        .mode-btn {
            background: transparent;
            color: #7f849c;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: #cba6f7;
            color: #11111b;
        }

        .time-selector {
            display: flex;
            gap: 8px;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .time-btn {
            background: #1e1e2e;
            color: #bac2de;
            border: 1px solid #313244;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .time-btn:hover {
            background: #313244;
            border-color: #45475a;
        }

        .time-btn.active {
            background: rgba(203, 166, 247, 0.15);
            color: #cba6f7;
            border-color: #cba6f7;
        }

        /* Dashboard Readouts */
        .dashboard {
            display: flex;
            gap: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .badge {
            background: #1e1e2e;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #313244;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #timer-container { color: #f38ba8; }
        #wpm-container { color: #a6e3a1; }

        /* Custom Font Interface Spaces */
        .font-preview {
            font-family: 'Starloaf', sans-serif;
        }

        #target-text {
            font-size: 36px;
            line-height: 1.5;
            text-align: left;
            margin-bottom: 25px;
            color: #9399b2;
            background: #11111b;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #1e1e2e;
            min-height: 140px;
            user-select: none;
            transition: all 0.3s ease;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 25px;
            font-size: 36px;
            line-height: 1.5;
            background-color: #11111b;
            color: #a6e3a1;
            border: 2px solid #1e1e2e;
            border-radius: 16px;
            resize: none;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        textarea:focus {
            border-color: #cba6f7;
            box-shadow: 0 0 0 4px rgba(203, 166, 247, 0.15), inset 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        textarea:disabled {
            border-color: #f38ba8;
            color: #f38ba8;
            opacity: 0.6;
            cursor: not-allowed;
        }

        textarea::placeholder {
            color: #585b70;
        }

        /* Control Action Buttons */
        .actions-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-action {
            background: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #313244;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background: #313244;
            border-color: #45475a;
            transform: translateY(-1px);
        }

        .btn-action:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>starloaf typing studio</h1>
            <div class="mode-toggle">
                <button id="btn-mode-test" class="mode-btn active" onclick="switchMode('test')">test mode</button>
                <button id="btn-mode-chill" class="mode-btn" onclick="switchMode('chill')">chill mode</button>
            </div>
        </header>

        <div class="toolbar">
            <div class="time-selector" id="time-selector">
                <button class="time-btn" onclick="setDuration(10)">10s</button>
                <button class="time-btn active" onclick="setDuration(15)">15s</button>
                <button class="time-btn" onclick="setDuration(20)">20s</button>
                <button class="time-btn" onclick="setDuration(30)">30s</button>
            </div>
            <div class="dashboard">
                <div class="badge" id="timer-container">time: <span id="timer">15</span>s</div>
                <div class="badge" id="wpm-container">wpm: <span id="wpm">0</span></div>
            </div>
        </div>

        <div id="target-text" class="font-preview">loading text...</div>

        <textarea 
            id="input-text" 
            placeholder="start typing here to begin the test..."
            autocomplete="off" 
            autocorrect="off" 
            autocapitalize="off" 
            spellcheck="false"
        ></textarea>

        <div class="actions-bar">
            <button id="btn-refresh" class="btn-action" onclick="initTest()">next paragraph</button>
        </div>
    </div>

    <script>
        const paragraphs = [
            "chicken and waffles make a fantastic lunch on a lazy sunday afternoon. a cool breeze blew through the windows while we sat around laughing and talking about everything.",
            "the quick brown fox jumps right over the lazy dog. please check the font closely to see if any of your letter shapes overlapping or running off the screen guidelines.",
            "hello there! are you here working on this creative design? it looks like a wonderful day to build something cool and see how nicely your custom handwriting types out."
        ];

        let currentMode = 'test'; // 'test' or 'chill'
        let selectedDuration = 15;
        let timeLeft = selectedDuration;
        let startTime = null;
        let countdownInterval = null;
        let testActive = false;

        const targetDisplay = document.getElementById('target-text');
        const inputArea = document.getElementById('input-text');
        const wpmDisplay = document.getElementById('wpm');
        const timerDisplay = document.getElementById('timer');
        const timeSelector = document.getElementById('time-selector');
        const timerContainer = document.getElementById('timer-container');
        const wpmContainer = document.getElementById('wpm-container');
        const refreshBtn = document.getElementById('btn-refresh');

        // Swap between Infinite Sandbox Sandbox and Standard Metrified Tests
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-mode-test').classList.remove('active');
            document.getElementById('btn-mode-chill').classList.remove('active');
            
            if (mode === 'test') {
                document.getElementById('btn-mode-test').classList.add('active');
                timeSelector.style.opacity = "1";
                timeSelector.style.visibility = "visible";
                timerContainer.style.display = "flex";
                targetDisplay.style.display = "block";
                refreshBtn.style.display = "block";
            } else {
                document.getElementById('btn-mode-chill').classList.add('active');
                timeSelector.style.opacity = "0";
                timeSelector.style.visibility = "hidden";
                timerContainer.style.display = "none";
                targetDisplay.style.display = "none";
                refreshBtn.style.display = "none";
            }
            initTest();
        }

        function setDuration(seconds) {
            if (testActive && inputArea.value.length > 0) return;
            selectedDuration = seconds;
            
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.innerText) === seconds) {
                    btn.classList.add('active');
                }
            });
            initTest();
        }

        function initTest() {
            clearInterval(countdownInterval);
            startTime = null;
            testActive = false;
            timeLeft = selectedDuration;
            
            timerDisplay.innerText = timeLeft;
            wpmDisplay.innerText = "0";
            inputArea.value = "";
            inputArea.disabled = false;
            
            if (currentMode === 'test') {
                inputArea.placeholder = "start typing here to begin the test...";
                const randomIndex = Math.floor(Math.random() * paragraphs.length);
                targetDisplay.innerText = paragraphs[randomIndex];
            } else {
                inputArea.placeholder = "chill mode active. type whatever you want here completely free...";
            }
        }

        function tick() {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            calculateWPM();

            if (timeLeft <= 0) {
                endTest();
            }
        }

        function calculateWPM() {
            if (!startTime) return;
            
            let timeElapsed;
            if (currentMode === 'test' && timeLeft <= 0) {
                timeElapsed = selectedDuration / 60;
            } else {
                timeElapsed = (Date.now() - startTime) / 1000 / 60;
            }
            
            const typedText = inputArea.value;
            if (typedText.length === 0 || timeElapsed === 0) {
                wpmDisplay.innerText = "0";
                return;
            }

            const wordsTyped = typedText.length / 5;
            const currentWPM = Math.round(wordsTyped / timeElapsed);
            wpmDisplay.innerText = currentWPM;
        }

        function endTest() {
            clearInterval(countdownInterval);
            testActive = false;
            inputArea.disabled = true;
            inputArea.placeholder = "test finished!";
            calculateWPM();
        }

        inputArea.addEventListener('input', (e) => {
            if (currentMode === 'test' && timeLeft <= 0) return;

            // Lowercase enforcement rule engine
            const cursorPosition = inputArea.selectionStart;
            inputArea.value = inputArea.value.toLowerCase();
            inputArea.setSelectionRange(cursorPosition, cursorPosition);

            // Clock trigger mechanism initialization
            if (!startTime && inputArea.value.length > 0) {
                startTime = Date.now();
                if (currentMode === 'test') {
                    testActive = true;
                    countdownInterval = setInterval(tick, 1000);
                } else {
                    countdownInterval = setInterval(calculateWPM, 1000);
                }
            }

            calculateWPM();
        });

        initTest();
    </script>

</body>
</html>
